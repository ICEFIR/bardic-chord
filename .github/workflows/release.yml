name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gh \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            python3-pip

      - name: Install stable Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install cargo-zigbuild and Zig
        run: |
          python3 -m pip install --user cargo-zigbuild
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release archives
        run: cargo xtask release

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v6
        with:
          name: bardic-chord-release-${{ github.ref_name }}
          path: |
            dist/*.tar.xz
            dist/*.tar.xz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes
          fi
