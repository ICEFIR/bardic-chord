name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gh \
            jq \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            python3-pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
          manifest_path: desktop/Cargo.toml
          verbose: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

      - name: Install Windows cross target
        if: steps.release-plz.outputs.releases_created == 'true'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install cargo-zigbuild
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          python3 -m pip install --user cargo-zigbuild
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release archives
        if: steps.release-plz.outputs.releases_created == 'true'
        run: cargo xtask release

      - name: Upload packaged artifacts to workflow run
        if: steps.release-plz.outputs.releases_created == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: bardic-chord-release-${{ github.sha }}
          path: |
            dist/*.tar.xz
            dist/*.tar.xz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload packaged artifacts to GitHub release
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}
          RELEASES_JSON: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          tag="$(jq -r '.[0].tag' <<<"$RELEASES_JSON")"
          gh release upload "$tag" dist/* --repo "$GITHUB_REPOSITORY" --clobber

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gh \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz update
        id: release-plz-update
        uses: release-plz/action@v0.5
        with:
          command: update
          config: release-plz.toml
          manifest_path: desktop/Cargo.toml
          verbose: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

      - name: Detect release changes
        id: release-changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          cargo_toml = tomllib.loads(Path("desktop/Cargo.toml").read_text())
          print(cargo_toml["package"]["version"])
          PY
          )"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create or refresh release PR
        if: steps.release-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}
          RELEASE_VERSION: ${{ steps.release-changes.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          existing_pr="$(
            gh pr list \
              --state open \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("release-plz-")) | .number' \
              | head -n 1
          )"

          if [ -n "${existing_pr:-}" ]; then
            gh pr close "$existing_pr" --delete-branch || gh pr close "$existing_pr"
          fi

          timestamp="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          branch="release-plz-${timestamp}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          git add -A
          git commit -m "chore: release v${RELEASE_VERSION}"
          git push --force-with-lease origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: release v${RELEASE_VERSION}" \
            --label release \
            --body "$(cat <<EOF
          ## New release

          - \`bardic-chord\`: next version \`${RELEASE_VERSION}\`

          This PR was generated by the release workflow using \`release-plz update\`.
          EOF
          )"
